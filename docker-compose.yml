services:
  # Base de datos principal para n8n (con gestor: localhost:5433)
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: n8n
    volumes:
      - ./postgres_data:/var/lib/postgresql

  # Motor de automatizaciones n8n (localhost:5679)
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_password

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: https://postcards-excuse-pet-properly.trycloudflare.com/
      N8N_EDITOR_BASE_URL: https://postcards-excuse-pet-properly.trycloudflare.com/
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: n8n-runners-secret-token
      N8N_NATIVE_PYTHON_RUNNER: "true"

      GENERIC_TIMEZONE: America/Lima
      TZ: America/Lima
    volumes:
      # Persistencia de credenciales, workflows y configuración de n8n
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  # Task runners externos para ejecutar Code Node (JS/Python) con aislamiento
  task-runners:
    build:
      context: .
      dockerfile: Dockerfile.runners
    restart: unless-stopped
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: n8n-runners-secret-token
      N8N_RUNNERS_EXTERNAL_ALLOW: pillow,PIL
    depends_on:
      - n8n

  # API Python propia del proyecto (FastAPI) expuesta en localhost:8002
  python-api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DEAPI_WEBHOOK_SECRET: ebe5f99114cd10b2d0818f8c206245712160e0610c025585c2e9068b0c08f975
    volumes:
      - ./outputs:/app/outputs
      - ./templates:/app/templates

  # Servidor web/proxy reverso para web estática, API y n8n
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - python-api
      - n8n
